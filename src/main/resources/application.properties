# ---------------------------------------------------------------------------
# SRTA gateway configuration
# Mirrors the OSB ShjRoadsTransportDeptServices flow. Override per environment;
# keep the Bearer JWT out of source control (env var SRTA_BACKEND_BEARER).
# ---------------------------------------------------------------------------

# Active profile: defaults to stg, overridable via SPRING_PROFILES_ACTIVE / -Dspring.profiles.active
spring.profiles.active=${SPRING_PROFILES_ACTIVE:stg}

# --- SRTA backend (steps 2 & 3) ---
srta.backend-base-url=https://eformstaging.srta.gov.ae/DeG/V1
# Static Bearer token OSB injected as the authorization header. Supply via env
# var; do NOT commit the real JWT.
srta.backend.bearer-token=${SRTA_BACKEND_BEARER:}

# --- User validation (step 1) ---
srta.validation.enabled=true
# Full URL of the validateUser service (SecuritySBusProject/validateUserService).
srta.validation.url=${SRTA_VALIDATE_URL:}
srta.validation.dscode=RT-001
# Which inbound paths to validate. Empty = all. OSB validated only /deg/lookup;
# for exact OSB parity set: srta.validation.paths=/deg/lookup
srta.validation.paths=

# --- Inbound -> backend path map (SRTA backend uses PascalCase op names) ---
srta.path-overrides[/deg/lookup]=/Lockup
srta.path-overrides[/deg/taxi-complaint-details]=/TaxiComplaintDetails
srta.path-overrides[/deg/lost-complaint-details]=/LostComplaintDetails
srta.path-overrides[/deg/road-complaint-details]=/RoadComplaintDetails

# --- Outbound HTTP timeouts (ms) ---
srta.http.connect-timeout-ms=10000
srta.http.read-timeout-ms=30000

# --- Actuator (standalone health/readiness) ---
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

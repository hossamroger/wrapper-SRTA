# ---------------------------------------------------------------------------
# SRTA gateway - PRODUCTION profile (WebLogic deploy) - confirm prod SRTA URL
# SRTA staging backend; secrets via env vars.
# ---------------------------------------------------------------------------

server.servlet.context-path=/online/shjroadsransportdeptservices

srta.backend-base-url=${SRTA_BACKEND_URL:https://eform.srta.gov.ae/DeG/V1}
srta.backend.bearer-token=${SRTA_BACKEND_BEARER:}

srta.validation.enabled=true
srta.validation.url=${SRTA_VALIDATE_URL:https://ds.sharjah.ae/appgateservices/api/api/login}
srta.validation.dscode=RT-001
srta.validation.paths=

srta.path-overrides[/deg/lookup]=/Lockup
srta.path-overrides[/deg/taxi-complaint-details]=/TaxiComplaintDetails
srta.path-overrides[/deg/lost-complaint-details]=/LostComplaintDetails
srta.path-overrides[/deg/road-complaint-details]=/RoadComplaintDetails

srta.http.connect-timeout-ms=10000
srta.http.read-timeout-ms=30000

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
